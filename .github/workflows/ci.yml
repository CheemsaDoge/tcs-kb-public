name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TCS-Cosheaf
        run: python -m pip install "git+https://github.com/CheemsaDoge/tcs-cosheaf.git@v0.3.0"

      - name: Show workspace configuration
        run: cosheaf workspace info

      - name: Validate public KB
        run: cosheaf validate

      - name: Run public KB policy guard self-test
        run: python scripts/check_public_kb_policy.py --self-test

      - name: Run public KB policy guard
        run: python scripts/check_public_kb_policy.py

      - name: Run gatekeeper
        run: cosheaf gate run

      - name: Run PR checklist gate
        run: cosheaf gate run --pr-checklist .github/pull_request_template.md

      - name: Check whitespace
        run: git diff --check
