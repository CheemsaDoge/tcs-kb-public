name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TCS-Cosheaf
        run: python -m pip install "git+https://github.com/CheemsaDoge/tcs-cosheaf.git@main"

      - name: Validate public KB
        run: cosheaf validate
