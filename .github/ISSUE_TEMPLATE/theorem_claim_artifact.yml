name: Theorem or claim artifact proposal
description: Propose one public theorem, claim, or proof-sketch related artifact.
title: "[theorem-claim] "
labels:
  - kb
  - theorem
body:
  - type: markdown
    attributes:
      value: |
        Use this template for public theorem or claim artifacts. Keep proof
        sketches conservative: they are explanatory and source-reviewed, not
        machine-checked proofs.
  - type: input
    id: artifact_id
    attributes:
      label: Artifact ID
      description: Proposed stable artifact identifier.
      placeholder: "theorem.example or claim.example"
    validations:
      required: true
  - type: dropdown
    id: artifact_type
    attributes:
      label: Artifact type
      options:
        - theorem
        - claim
        - proof sketch
        - other
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define the smallest reviewable theorem or claim change.
      placeholder: "Add one theorem statement only; no new proof sketch in this PR."
    validations:
      required: true
  - type: textarea
    id: statement
    attributes:
      label: Statement
      description: Draft the theorem, claim, or proof-sketch statement.
    validations:
      required: true
  - type: textarea
    id: source_metadata
    attributes:
      label: Source metadata
      description: Provide public, citable source metadata and locator status.
      placeholder: "Title, authors, year, edition/version, URL/DOI/arXiv, theorem/lemma/page/section if confirmed."
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependency list
      description: List accepted artifact dependencies or explicit external dependencies.
      placeholder: "`definition.graph`; `theorem.example-prereq`; external:..."
    validations:
      required: true
  - type: textarea
    id: review_status
    attributes:
      label: Review status
      description: State current human review status and planned review record path.
      placeholder: "requested; planned record: reviews/human/review.theorem.example.md"
    validations:
      required: true
  - type: dropdown
    id: formalization_status
    attributes:
      label: Formalization status
      description: Select checked only if a real checker already ran and recorded evidence.
      options:
        - planned
        - linked
        - checked
        - not applicable
        - broken
        - deprecated
    validations:
      required: true
  - type: textarea
    id: limitations
    attributes:
      label: Known limitations
      description: Record source, convention, proof-sketch, formal-link, or alignment limits.
      placeholder: "No Lean check; proof sketch is not machine checked; alignment review requested."
    validations:
      required: true
  - type: checkboxes
    id: policy
    attributes:
      label: Policy checks
      options:
        - label: This proposal contains no private conjectures, private notes, or unpublished research ideas.
          required: true
        - label: This proposal contains no private workspace material.
          required: true
        - label: Accepted status will require source metadata, validation/gates, and human review.
          required: true
        - label: Validation or gate success will not be treated as human review.
          required: true
        - label: Formal links will not be presented as Lean, mathlib, CSLib, SAT, SMT, or semantic-alignment proof.
          required: true
