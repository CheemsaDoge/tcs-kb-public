name: Source ingestion
description: Propose a small source-ingestion task.
title: "[source] "
labels:
  - source
body:
  - type: markdown
    attributes:
      value: |
        Use this for a small source-ingestion task. Prefer the source note
        template when the issue is only adding one durable source note.

        Source ingestion is planning and review work. It does not make any
        artifact accepted without artifact-local source metadata, validation,
        gates, and human review.
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Identify the narrow source-ingestion scope.
      placeholder: "Review one chapter/section for candidate definition artifacts; no mass import."
    validations:
      required: true
  - type: textarea
    id: source_metadata
    attributes:
      label: Source metadata
      description: Identify the public source and locator status.
      placeholder: "Title, authors, year, edition/version, URL/DOI/arXiv, chapter/section/page/theorem if confirmed."
    validations:
      required: true
  - type: textarea
    id: statement
    attributes:
      label: Intended statements or concepts
      description: List the statements, definitions, or conventions the source may support.
      placeholder: "Definition of ..., theorem statement ..., convention notes ..."
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Candidate artifacts and dependencies
      description: List candidate artifacts, expected dependencies, and whether each is accepted/draft/planned.
      placeholder: "`definition.example` depends on `definition.graph`; source note only; N/A."
    validations:
      required: true
  - type: textarea
    id: review_status
    attributes:
      label: Review status
      description: State bibliographic and human review status.
      placeholder: "requested; no human review record yet."
    validations:
      required: true
  - type: dropdown
    id: formalization_status
    attributes:
      label: Formalization status
      description: Source ingestion normally starts with no checked formalization.
      options:
        - not applicable
        - planned
        - linked
        - checked
    validations:
      required: true
  - type: textarea
    id: limitations
    attributes:
      label: Known limitations
      description: Record uncertain source locators, edition differences, scope limits, or formal-link limits.
      placeholder: "Exact page unknown; source note does not replace artifact-local metadata; no Lean check."
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This is not a mass paper import.
          required: true
        - label: This includes no private workspace material, private conjectures, or unpublished research ideas.
          required: true
        - label: No page, theorem, lemma, or section locator is fabricated.
          required: true
        - label: Accepted artifacts will require source metadata and human review.
          required: true
        - label: Validation or gate success will not be treated as human review.
          required: true
