name: Formal link proposal
description: Propose formalization metadata for an existing or planned artifact.
title: "[formal-link] "
labels:
  - formalization
body:
  - type: markdown
    attributes:
      value: |
        Formal links are metadata unless a real checker verifies them and records
        evidence. Lean `#check`, if implemented later, checks symbol/import
        availability only; it does not prove informal/formal semantic alignment.
  - type: input
    id: artifact_id
    attributes:
      label: Artifact ID
      placeholder: "definition.graph"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define the formal-link metadata change.
      placeholder: "Add planned external-library reference only; no status upgrade."
    validations:
      required: true
  - type: textarea
    id: statement
    attributes:
      label: Informal statement being linked
      description: Summarize the artifact statement or convention the link is meant to relate to.
    validations:
      required: true
  - type: textarea
    id: source_metadata
    attributes:
      label: Source metadata
      description: Identify the public source metadata for the informal artifact.
      placeholder: "Artifact-local sources already recorded in ..., or source metadata still needed."
    validations:
      required: true
  - type: textarea
    id: formal_reference
    attributes:
      label: Formal reference metadata
      description: Record system, library, library_ref, import path, symbol, declaration kind, and check mode.
      placeholder: "system: lean4; library: CSLib; import_path: ...; symbol: ...; status: planned; check_mode: external_library_ref"
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependency list
      description: List artifact dependencies and formal-library manifest dependencies.
      placeholder: "`definition.graph`; library_ref: cslib-main"
    validations:
      required: true
  - type: textarea
    id: review_status
    attributes:
      label: Review status
      description: State formal-link and human alignment review status.
      placeholder: "formal link requested; alignment.status: requested; no checker evidence."
    validations:
      required: true
  - type: dropdown
    id: formalization_status
    attributes:
      label: Formalization status
      description: Select checked only if a real checker already ran and recorded evidence.
      options:
        - planned
        - linked
        - checked
        - broken
        - deprecated
        - not applicable
    validations:
      required: true
  - type: textarea
    id: limitations
    attributes:
      label: Known limitations
      description: Record checker, library, convention, and alignment limits.
      placeholder: "No Lean run; symbol existence unverified; semantic alignment not reviewed."
    validations:
      required: true
  - type: checkboxes
    id: policy
    attributes:
      label: Policy checks
      options:
        - label: This proposal contains no private material.
          required: true
        - label: Planned or linked formalization metadata will not be presented as checker evidence.
          required: true
        - label: Lean/mathlib/CSLib verification will not be claimed unless a real checker ran and recorded evidence.
          required: true
        - label: Informal/formal semantic alignment will not be claimed without human alignment review.
          required: true
        - label: Validation or gate success will not be treated as human review.
          required: true
