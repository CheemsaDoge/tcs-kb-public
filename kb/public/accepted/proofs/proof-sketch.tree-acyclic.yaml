statement: 'Proof sketch for theorem.tree-acyclic.


  Under the current tree convention, definition.tree states that a tree is a connected
  acyclic graph. Therefore the acyclic component of that definition gives definition.acyclic
  for any tree, which is exactly the statement recorded by theorem.tree-acyclic. This
  is a definitional expansion proof sketch, not Lean-checked, not machine-checked,
  and not Lean verification evidence.'
