statement: 'Proof sketch for theorem.cycle-contains-path.


  This proof sketch explains why, in a cycle, any two vertices on the cycle are joined
  by a path contained in the cycle. reasoning classification: elementary argument.


  Informal idea only: a cycle gives two arcs between vertices on the cyclic order;
  either arc is a path contained in the cycle. This proof sketch is not Lean-checked,
  not machine-checked, not Lean verification evidence, and no machine-checked proof
  is claimed.'
